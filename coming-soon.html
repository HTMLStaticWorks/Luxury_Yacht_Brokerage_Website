<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Ocean Elite</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5947?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; color: white; text-align: center; position: relative;">
    <div style="position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);"></div>

    <div class="container" style="position: relative; z-index: 2;">
        <img src="logo.svg" alt="Logo" style="height: 50px; margin-bottom: 3rem;">
        <h1 style="font-size: 4rem; margin-bottom: 1rem;">Launching <span class="text-gold">Soon</span></h1>
        <p style="opacity: 0.8; margin-bottom: 4rem; font-size: 1.25rem;">Our new collection of world-class superyachts is almost ready for departure.</p>

        <div style="display: flex; justify-content: center; gap: 3rem; margin-bottom: 4rem;">
            <div>
                <span style="display: block; font-size: 3rem; font-weight: 700;">14</span>
                <span style="font-size: 0.75rem; text-transform: uppercase;">Days</span>
            </div>
            <div>
                <span style="display: block; font-size: 3rem; font-weight: 700;">08</span>
                <span style="font-size: 0.75rem; text-transform: uppercase;">Hours</span>
            </div>
            <div>
                <span style="display: block; font-size: 3rem; font-weight: 700;">45</span>
                <span style="font-size: 0.75rem; text-transform: uppercase;">Minutes</span>
            </div>
        </div>

        <div style="max-width: 500px; margin: 0 auto; display: flex; border: 1px solid rgba(255,255,255,0.3);">
            <input type="email" placeholder="Notify me on launch" style="flex: 1; padding: 1rem; background: transparent; border: none; color: white; font-family: inherit;">
            <button class="btn btn-primary">Join Waitlist</button>
        </div>
        
        <div style="margin-top: 4rem; display: flex; gap: 1rem; justify-content: center;" class="nav-actions">
             <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
             <button id="rtl-toggle" class="btn-icon"><i class="fas fa-language"></i></button>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <style>
        /* Global styles applied */
    </style>
</body>
</html>
