<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ocean Elite</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-light);">

    <div
        style="width: 1000px; max-width: 95vw; background: var(--bg-white); display: flex; box-shadow: var(--shadow); height: 550px; overflow: hidden; border-radius: 4px;">
        <!-- Left Side: Image -->
        <div
            style="flex: 1; background: url('https://images.unsplash.com/photo-1605281317010-fe54774b9ef6?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat; position: relative;">
            <div style="position: absolute; top: 2rem; left: 2rem;">
                <a href="index.html"><img src="logo.svg" alt="Ocean Elite Logo" class="logo"></a>
            </div>
            <div style="position: absolute; bottom: 2rem; left: 2rem; color: white;">
                <h2 style="font-size: 2rem;">Exclusive <br> Access</h2>
            </div>
        </div>

        <div style="flex: 1; padding: 3rem; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="margin-bottom: 1.5rem;">Welcome <span class="text-gold">Back</span></h2>
            <form style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600;">Email
                        Address</label>
                    <input type="email" placeholder="Enter your email"
                        style="padding: 1rem; border: 1px solid var(--border-color); background: transparent; font-family: inherit;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; font-weight: 600;">Password</label>
                    <input type="password" placeholder="••••••••"
                        style="padding: 1rem; border: 1px solid var(--border-color); background: transparent; font-family: inherit;">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.813rem;">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="text-gold">Forgot password?</a>
                </div>
                <a href="dashboard.html" class="btn btn-primary">Login</a>
                <p style="font-size: 0.875rem; text-align: center; margin-top: 1rem;">Don't have an account? <a
                        href="register.html" class="text-gold">Register</a></p>
            </form>

            <div style="margin-top: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                <div style="display: flex; align-items: center; width: 100%; gap: 1rem; opacity: 0.3;">
                    <div style="flex: 1; height: 1px; background: var(--text-dark);"></div>
                    <span style="font-size: 0.7rem; text-transform: uppercase; font-weight: 700;">Or Login With</span>
                    <div style="flex: 1; height: 1px; background: var(--text-dark);"></div>
                </div>

                <div style="display: flex; gap: 0.75rem; width: 100%;">
                    <a href="#" class="btn btn-outline" style="flex: 1; display: flex; gap: 0.5rem; font-size: 0.7rem; padding: 0.6rem;">
                        <i class="fab fa-google"></i> Google
                    </a>
                    <a href="#" class="btn btn-outline" style="flex: 1; display: flex; gap: 0.5rem; font-size: 0.7rem; padding: 0.6rem;">
                        <i class="fab fa-apple"></i> Apple
                    </a>
                </div>

                <div class="nav-actions" style="margin-top: 0.5rem;">
                    <button id="theme-toggle" class="btn-icon" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                    <button id="rtl-toggle" class="btn-icon" title="Toggle RTL"><i class="fas fa-language"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <style>
        [dir="rtl"] div[style*="position: relative"]>div {
            left: auto !important;
            right: 2rem !important;
            text-align: right;
        }
    </style>
</body>

</html>
