<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ocean Elite</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page-wrapper">
    <!-- Page Toggles -->
    <div class="nav-actions">
        <div class="nav-toggle-group">
            <button id="theme-toggle" class="btn-icon" title="Toggle Theme"><i class="fas fa-moon"></i></button>
            <button id="rtl-toggle" class="btn-icon" title="Toggle RTL">RTL</button>
        </div>
    </div>
    <div class="auth-card">
        <!-- Left Side: Image -->
        <div class="auth-image" style="background-image: url('assets/images/login2.avif');">

            <div style="position: absolute; bottom: 2rem; left: 2rem; color: white;">
                <h2 style="font-size: 2rem;">Exclusive <br> Access</h2>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-form-inner">
                <div class="auth-header-center">
                    <a href="index.html"><img src="logo.svg" alt="Ocean Elite Logo" class="logo"></a>
                    <h2>Welcome <span class="text-gold">Back</span></h2>
                </div>
                <form style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <input type="email" placeholder="Email Address"
                        style="padding: 1rem; border: 1px solid var(--border-color); background: transparent; font-family: inherit;">
                    <input type="password" placeholder="Password"
                        style="padding: 1rem; border: 1px solid var(--border-color); background: transparent; font-family: inherit;">
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.813rem;">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" class="text-gold">Forgot password?</a>
                    </div>
                    <a href="dashboard.html" class="btn btn-primary">Login</a>
                    <p style="font-size: 0.875rem; text-align: center; margin-top: 1rem;">Don't have an account? <a
                            href="register.html" class="text-gold">Register</a></p>
                </form>

                <div style="margin-top: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
                    <div style="display: flex; align-items: center; width: 100%; gap: 1rem; opacity: 0.3;">
                        <div style="flex: 1; height: 1px; background: var(--text-dark);"></div>
                        <span style="font-size: 0.7rem; text-transform: uppercase; font-weight: 700;">Or Login With</span>
                        <div style="flex: 1; height: 1px; background: var(--text-dark);"></div>
                    </div>

                    <div style="display: flex; gap: 1rem; width: 100%;">
                        <a href="#" class="btn btn-outline"
                            style="flex: 1; display: flex; gap: 0.5rem; font-size: 0.75rem; padding: 0.75rem;">
                            <i class="fab fa-google"></i> Google
                        </a>
                        <a href="#" class="btn btn-outline"
                            style="flex: 1; display: flex; gap: 0.5rem; font-size: 0.75rem; padding: 0.75rem;">
                            <i class="fab fa-apple"></i> Apple
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>

</body>

</html>
